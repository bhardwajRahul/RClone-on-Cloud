<div class="mb-6 flex items-center justify-between">
  <h1 class="text-2xl font-bold">Remotes</h1>
</div>

<div class="mb-4xl">
  @if (remotesResult$ | async; as result) {
  @if (result | isPending) {
  <div data-testid="remote-skeleton" class="skeleton w-32 h-16 rounded-md"></div>
  } @else if (result | hasFailed) {
  <span data-testid="remotes-error" class="text-error">
    Error: {{ result.error!.message }}
  </span>
  } @else {
  <div class="flex flex-wrap gap-4">
    @for (remote of result.data!.remotes; track remote) {
    <div data-testid="remote-card"
      class="flex items-center gap-2 border border-opacity-50 rounded-md pl-5 pr-6 pt-3 pb-3 hover:bg-base-300 cursor-pointer hover:underline">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.742 3.742 0 0 1 15.75 19.5H6.75Z" />
      </svg>

      <div data-testid="remote-card-name" class="text-sm">
        {{ remote }}
      </div>
    </div>
    }
  </div>
  }
  }
</div>
