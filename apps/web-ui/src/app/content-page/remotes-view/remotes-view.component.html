<div class="mb-6 flex items-center justify-between">
  <h1 class="font-bold">Your Remotes</h1>
</div>

<div class="mb-4xl">
  @if (remotesResult$ | async; as remotesResult) {
    @if (remotesResult | isPending) {
      <div
        data-testid="remote-skeleton"
        class="skeleton w-32 h-16 rounded-md"
      ></div>
    } @else if (remotesResult | hasFailed) {
      <span data-testid="remotes-error" class="text-error">
        Error: {{ remotesResult.error!.message }}
      </span>
    } @else {
      <div class="flex flex-wrap gap-4">
        @for (remote of remotesResult.data!.remotes; track remote) {
          <app-remote-card [remote]="remote"></app-remote-card>
        }
      </div>
    }
  }
</div>
