<div class="dropdown">
  <div tabindex="0" role="button" class="btn btn-ghost btn-circle btn-xs">

      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="1.5"
      stroke="currentColor"
      class="size-6"
    >

        stroke-linecap="round"
        stroke-linejoin="round"

    <li>
      <button data-testid="copy-button" type="button" (click)="copy()" class="whitespace-nowrap">

          xmlns="http://www.w3.org/2000/svg"

          viewBox="0 0 24 24"

        Copy
      </button>
    </li>
    <li>
      <button
        data-testid="rename-button"
        type="button"

        class="whitespace-nowrap"

          xmlns="http://www.w3.org/2000/svg"
