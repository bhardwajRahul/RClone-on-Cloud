<dialog #modal class="modal">
  <div class="modal-box">
    <h3 class="text-lg font-bold text-base-content">Delete item?</h3>

    <p class="mt-3 text-sm leading-6 text-base-content/80">
      @if (request()?.item?.isDir) {
        Are you sure you want to delete this directory?
      } @else {
        Are you sure you want to delete this file?
      }
    </p>

    <div class="modal-action mt-6">
      <form method="dialog" class="flex w-full justify-end gap-3">
        <button
          data-testid="cancel-button"
          value="no"
          class="btn btn-ghost"
          (click)="closeDialog()"
        >
          No
        </button>

        <button
          data-testid="delete-button"
          value="yes"
          class="btn btn-error"
          (click)="confirmDelete()"
        >
          Yes
        </button>
      </form>
    </div>
  </div>

  <form
    method="dialog"
    class="modal-backdrop"
    (click)="closeDialog()"
    (keydown.enter)="closeDialog()"
  >
    <button>close</button>
  </form>
</dialog>
