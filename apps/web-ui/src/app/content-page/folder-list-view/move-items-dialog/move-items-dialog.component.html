<dialog #modal class="modal">
  <div class="modal-box">
    <h3 class="text-lg font-bold text-base-content">Move item</h3>

    <p class="mt-3 text-sm leading-6 text-base-content/80">
      Choose the destination folder for this file / directory.
    </p>

    <div class="mt-4">
      <p class="block text-sm font-medium text-base-content/80 mb-2">Source</p>
      <div class="text-sm text-base-content/70 bg-base-200/60 rounded-lg px-3 py-2">
        {{ request()?.item?.path }}
      </div>
    </div>

    <div class="mt-4">
      <label for="destination-path" class="block text-sm font-medium text-base-content/80 mb-2">
        Destination folder path
      </label>

      <input
        data-testid="destination-path"
        id="destination-path"
        name="destinationPath"
        type="text"
        class="input input-bordered w-full"
        [(ngModel)]="destinationPath"
        (keydown.enter)="confirmMove()"
        placeholder="/folder/subfolder"
      />
    </div>

    @if (getPreviewPath()) {
      <div class="mt-4">
        <p class="block text-sm font-medium text-base-content/80 mb-2">Final path</p>
        <div class="text-sm text-base-content/70 bg-base-200/60 rounded-lg px-3 py-2 break-all">
          {{ getPreviewPath() }}
        </div>
      </div>
    }

    <div class="modal-action mt-6">
      <form method="dialog" class="flex w-full justify-end gap-3">
        <button
          data-testid="cancel-button"
          value="cancel"
          type="button"
          class="btn btn-ghost"
          (click)="closeDialog()"
        >
          Cancel
        </button>

        <button
          data-testid="move-button"
          value="move"
          type="button"
          class="btn btn-primary"
          [disabled]="!destinationPath.trim()"
          (click)="confirmMove()"
        >
          Move
        </button>
      </form>
    </div>
  </div>

  <form
    method="dialog"
    class="modal-backdrop"
    (click)="closeDialog()"
    (keydown.enter)="closeDialog()"
  >
    <button>close</button>
  </form>
</dialog>
