<div
  class="flex flex-col items-center justify-center gap-4 p-8 bg-base-200 rounded-lg min-w-[320px]"
>
  <svg
    xmlns="http://www.w3.org/2000/svg"
    fill="none"
    viewBox="0 0 24 24"
    stroke-width="1.5"
    stroke="currentColor"
    class="size-16 opacity-40"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"
    />
  </svg>
  <p class="text-base-content/60" data-testid="unsupported-viewer">
    This file type cannot be previewed.
  </p>
  <p class="text-sm text-base-content/40">{{ fileName() }}</p>
  <a [href]="blobUrl()" [download]="fileName()" class="btn btn-primary btn-sm">
    Download File
  </a>
</div>
